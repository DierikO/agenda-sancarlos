<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Municipal - San Carlos</title>
    <style>
        /* Configuración de colores institucionales */
        :root {
            --primary-color: #005aab; /* Azul institucional */
            --secondary-color: #f8f9fa;
            --text-color: #333;
        }

        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #e9ecef; 
            color: var(--text-color); 
        }

        header { 
            background-color: white; 
            padding: 25px 15px; 
            text-align: center; 
            border-bottom: 4px solid var(--primary-color);
        }

        header img {
            max-width: 120px; /* Aquí iría el escudo de San Carlos */
            margin-bottom: 10px;
        }

        header h1 { 
            margin: 5px 0; 
            font-size: 1.8rem; 
            color: var(--primary-color); 
        }

        header p { margin: 0; font-size: 1rem; color: #666; }

        .container { 
            max-width: 900px; 
            margin: 20px auto; 
            padding: 0 15px; 
        }

        /* Contenedor del Calendario con sombra */
        .calendar-card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            margin-bottom: 30px; 
        }

        /* Botonera de acceso rápido */
        .services-title {
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            color: #555;
        }

        .grid-links { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 12px; 
            margin-bottom: 40px;
        }

        .box { 
            background-color: white; 
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .box:hover { 
            background-color: var(--primary-color); 
            color: white; 
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,90,171,0.2);
        }

        footer { 
            text-align: center; 
            padding: 30px; 
            font-size: 0.85rem; 
            color: #888; 
            background: white;
            margin-top: 50px;
        }

        /* Ajuste para que el calendario sea fluido */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 600px;
        }

        @media (max-width: 600px) {
            .iframe-container { height: 500px; }
            header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://via.placeholder.com/150x80?text=ESCUDO" alt="Escudo San Carlos">
    <h1>Agenda Municipal de San Carlos</h1>
    <p>Comunicación directa con el vecino</p>
</header>

<div class="container">
    
    <div class="calendar-card">
        <div class="iframe-container">
            <iframe src="https://calendar.google.com/calendar/embed?src=5a91458349cf38efcffe6b09fc4bbe30641ce690d959230aec7c604a23cd77ef%40group.calendar.google.com&ctz=America%2FArgentina%2FBuenos_Aires&mode=AGENDA&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0" 
            style="border: 0" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>

    <p class="services-title">ACCESOS RÁPIDOS</p>
    
    <div class="grid-links">
        <a href="https://wa.me/TUNUMERO" class="btn box"><span>💬</span> WhatsApp</a>
        <a href="#" class="btn box"><span>💳</span> Pago Tasas</a>
        <a href="#" class="btn box"><span>🚗</span> Licencias</a>
        <a href="#" class="btn box"><span>🏥</span> Turnos Salud</a>
        <a href="#" class="btn box"><span>📞</span> Teléfonos</a>
        <a href="#" class="btn box"><span>📄</span> Trámites</a>
    </div>

</div>

<footer>
    <strong>Municipalidad de San Carlos</strong><br>
    Gestión Transparente y Cercana al Vecino<br>
    © 2026
</footer>

</body>
</html>
